<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>應徵履歷列印工具｜央大門市 &amp; 豐亞門市</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1a5c3a; --gold: #e6a817;
  --text: #111; --bg: #ddd; --white: #fff; --radius: 8px;
}
body { font-family: 'Noto Sans TC','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text); }
header { background: var(--green); color: #fff; padding: 16px 32px; display: flex; align-items: center; gap: 14px; }
.hl { width: 40px; height: 40px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: #0f3d26; flex-shrink: 0; }
.ht { font-size: 16px; font-weight: 700; }
.hs { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.wrap { max-width: 860px; margin: 0 auto; padding: 22px 20px 50px; }
.card { background: #fff; border-radius: var(--radius); border: 1px solid #bbb; padding: 20px 22px; margin-bottom: 14px; }
.ct { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 12px; padding-left: 10px; border-left: 4px solid var(--green); }
.step { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 7px; }
.sn { width: 22px; height: 22px; background: var(--green); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.st { font-size: 13px; color: #555; line-height: 1.6; }
textarea { width: 100%; height: 100px; font-size: 11.5px; font-family: 'Courier New',monospace; padding: 10px 12px; border: 1px solid #bbb; border-radius: var(--radius); background: #fafafa; color: #111; resize: vertical; }
textarea:focus { outline: none; border-color: var(--green); }
.br { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.btn { padding: 8px 20px; font-size: 13px; font-family: inherit; font-weight: 500; border-radius: var(--radius); cursor: pointer; }
.bp { background: var(--green); color: #fff; border: none; }
.bp:hover { background: #0f3d26; }
.bo { background: #fff; color: #111; border: 1px solid #bbb; }
.bo:hover { background: #eee; }
.bpr { background: var(--gold); color: #0f3d26; border: none; font-weight: 700; }
.bpr:hover { background: #c9900f; }
#status { font-size: 12px; color: var(--green); margin-top: 8px; min-height: 18px; font-weight: 500; }
#status.err { color: #c0392b; }
#selrow { display: none; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; padding: 12px 16px; background: #eaf4ee; border-radius: var(--radius); border: 1px solid #b8dbc8; }
#selrow label { font-size: 13px; font-weight: 700; color: var(--green); }
select { padding: 6px 12px; font-size: 13px; font-family: inherit; border: 1px solid #aaa; border-radius: var(--radius); background: #fff; color: #111; cursor: pointer; }
.hint { display: none; background: #fffbea; border: 1px solid #ffe082; border-radius: var(--radius); padding: 10px 14px; font-size: 12px; color: #6b4c00; margin-top: 10px; line-height: 1.7; }

/* ── A4 Wrapper ── */
#a4wrap { display: none; background: #888; padding: 28px 0 48px; margin-top: 20px; }
#a4lbl { text-align: center; font-size: 12px; color: #ddd; margin-bottom: 12px; }

/* ── A4 Sheet: 794×1123px ── */
#a4 {
  width: 794px; min-height: 1123px;
  margin: 0 auto;
  background: #fff; color: #000;
  font-family: 'Noto Sans TC','Microsoft JhengHei',sans-serif;
  font-size: 13.5px; line-height: 1.65;
  box-shadow: 0 6px 32px rgba(0,0,0,0.45);
  position: relative; overflow: hidden;
}

/* ── Resume Header bar ── */
.rh {
  background: #000; color: #fff;
  padding: 22px 38px;
  display: flex; align-items: center; gap: 20px;
}
.av {
  width: 60px; height: 60px; border-radius: 50%;
  background: #fff; color: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 900; flex-shrink: 0;
}
.rname { font-size: 28px; font-weight: 900; letter-spacing: 0.06em; }
.rsub { font-size: 11.5px; opacity: 0.6; margin-top: 4px; }

/* ── Body ── */
.rbody { padding: 22px 38px 80px; }

/* ── Section head ── */
.sh {
  display: block;
  font-size: 13px; font-weight: 900;
  color: #000;
  background: #e8e8e8;
  border-left: 6px solid #000;
  padding: 5px 10px;
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}

/* ── 3-col top grid ── */
.tg { display: grid; grid-template-columns: 1.1fr 0.95fr 0.85fr; gap: 0 24px; margin-bottom: 20px; }
.rsec { margin-bottom: 16px; }

/* ── Field rows ── */
.fr { display: flex; padding: 4px 0; border-bottom: 1px solid #ccc; }
.fl { font-size: 11.5px; font-weight: 700; color: #333; min-width: 76px; flex-shrink: 0; }
.fv { font-size: 13.5px; font-weight: 500; color: #000; word-break: break-all; flex: 1; }

/* ── Horizontal divider ── */
.hdiv { border: none; border-top: 2.5px solid #000; margin: 0 0 18px; }

/* ── Experience ── */
.exgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.eb { border: 2.5px solid #000; padding: 12px 14px; border-radius: 4px; }
.ebnone { border: 2px dashed #bbb; padding: 12px 14px; border-radius: 4px; color: #bbb; font-size: 12px; display: flex; align-items: center; justify-content: center; min-height: 90px; }
.ec { font-size: 16px; font-weight: 900; color: #000; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid #000; }
.ef { display: flex; padding: 3px 0; border-bottom: 1px solid #ddd; }
.efl { font-size: 11.5px; font-weight: 700; color: #444; min-width: 60px; flex-shrink: 0; }
.efv { font-size: 13px; font-weight: 500; color: #000; }

/* ── Shift badges ── */
.sbadges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.sbadge { background: #000; color: #fff; border-radius: 3px; padding: 3px 10px; font-size: 12px; font-weight: 700; }

/* ── Footer ── */
.agree { position: absolute; bottom: 22px; left: 38px; right: 38px; border-top: 1px solid #aaa; padding-top: 7px; font-size: 10px; color: #888; text-align: center; }

/* ===== PRINT ===== */
@media print {
  body { background: #fff; }
  header, .wrap, #a4lbl { display: none !important; }
  #a4wrap { display: block !important; background: #fff; padding: 0; margin: 0; }
  #a4 { width: 210mm; min-height: 297mm; margin: 0; box-shadow: none; font-size: 13px; }
  .rh { padding: 14mm 16mm 14px; }
  .rbody { padding: 16px 16mm 22mm; }
  .agree { bottom: 10mm; left: 16mm; right: 16mm; }
}
</style>
</head>
<body>

<header>
  <div class="hl">7</div>
  <div>
    <div class="ht">應徵履歷 A4 列印工具</div>
    <div class="hs">央大門市 &amp; 豐亞門市｜門市人員應徵表</div>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <div class="ct">使用說明</div>
    <div class="step"><div class="sn">1</div><div class="st">開啟 Google 試算表（表單回應），選取<strong>第一列標題 ＋ 要列印的資料列</strong>，複製</div></div>
    <div class="step"><div class="sn">2</div><div class="st">貼入下方文字框，按「解析資料」</div></div>
    <div class="step"><div class="sn">3</div><div class="st">從下拉選單選擇應徵者，預覽即時產生</div></div>
    <div class="step"><div class="sn">4</div><div class="st">按「列印 / 存成 PDF」，選 A4、取消頁首頁尾、縮放「符合頁面」</div></div>
  </div>
  <div class="card">
    <div class="ct">貼上試算表資料</div>
    <textarea id="ta" placeholder="請複製試算表的「標題列＋資料列」後貼到這裡&#10;&#10;格式範例：&#10;時間戳記	Email	姓名	身份證字號	出生年月日…&#10;2025/01/01	abc@gmail.com	李惠茹	H225516652	2001/3/27…"></textarea>
    <div id="status"></div>
    <div class="br">
      <button class="btn bp" onclick="parseData()">解析資料</button>
      <button class="btn bo" onclick="clearAll()">清除</button>
    </div>
    <div id="selrow">
      <label>選擇應徵者：</label>
      <select id="sel" onchange="renderResume()"></select>
      <button class="btn bpr" onclick="window.print()">🖨 列印 / 存成 PDF</button>
    </div>
    <div class="hint" id="hint">💡 列印設定：紙張 A4 → 取消頁首頁尾 → 縮放「符合頁面」→ 儲存 PDF 或直接列印</div>
  </div>
</div>

<div id="a4wrap">
  <div id="a4lbl">▼ A4 預覽（黑白列印版）</div>
  <div id="a4"></div>
</div>

<script>
let recs=[], hdrs=[];

function parseData(){
  const raw=document.getElementById('ta').value.trim();
  const st=document.getElementById('status');
  if(!raw){st.className='err';st.textContent='⚠ 請先貼上資料。';return;}
  const lines=raw.split('\n').filter(l=>l.trim());
  if(lines.length<2){st.className='err';st.textContent='⚠ 需要標題列＋至少一筆資料。';return;}
  hdrs=lines[0].split('\t').map(h=>h.trim());
  recs=lines.slice(1).map(line=>{
    const c=line.split('\t'),o={};
    hdrs.forEach((h,i)=>o[h]=(c[i]||'').trim());
    return o;
  });
  st.className='';
  st.textContent=`✓ 已解析 ${recs.length} 筆應徵資料`;
  const sel=document.getElementById('sel');
  sel.innerHTML=recs.map((r,i)=>`<option value="${i}">${r['姓名']||'第'+(i+1)+'筆'}</option>`).join('');
  document.getElementById('selrow').style.display='flex';
  document.getElementById('hint').style.display='block';
  renderResume();
}

function v(r,key){return(r[key]||'').trim();}

function fr(label,val){
  if(!val||val==='無')return'';
  return`<div class="fr"><span class="fl">${label}</span><span class="fv">${val}</span></div>`;
}
function ef(label,val){
  if(!val||val==='無')return'';
  return`<div class="ef"><span class="efl">${label}</span><span class="efv">${val}</span></div>`;
}

function buildExp(r,num){
  const ch=num===1?'一':'二';
  const co=v(r,`【經歷${ch}】服務機關名稱`);
  if(!co||co==='無')return`<div class="ebnone">無第${ch}段工作經歷</div>`;
  let ti='',pe='',pw='',re='';
  if(num===1){
    ti=v(r,'職位名稱');pw=v(r,'待遇');
    pe=v(r,'任職期間（例：2020/03 至 2022/06）')||v(r,'任職期間');
    re=v(r,'離職原因');
  } else {
    const keys=Object.keys(r);
    const i2=keys.findIndex(k=>k===`【經歷${ch}】服務機關名稱`);
    if(i2>-1){ti=r[keys[i2+1]]||'';pe=r[keys[i2+2]]||'';re=r[keys[i2+3]]||'';}
  }
  return`<div class="eb">
    <div class="ec">${co}</div>
    ${ef('職稱',ti)}
    ${num===1&&pw?ef('待遇',pw):''}
    ${ef('任職期間',pe)}
    ${ef('離職原因',re)}
  </div>`;
}

function renderResume(){
  const idx=parseInt(document.getElementById('sel').value);
  const r=recs[idx]; if(!r)return;
  const name=v(r,'姓名');
  const init=name?name[0]:'?';
  const shifts=v(r,'期望上班班別（可複選）');
  const shiftArr=shifts?shifts.split(/[，,、]/).map(s=>s.trim()).filter(Boolean):[];
  const src=v(r,'得知本次招募的管道（可複選）');
  const ref=v(r,'若朋友介紹，請填介紹人姓名');
  const platform=v(r,'若人力銀行，請填平台名稱');
  const sevenExp=v(r,'是否有統一超商經歷：');
  const storeRef=v(r,'若是，請填直營或加盟店及門市名稱');
  const loc=v(r,'期望工作地點（可複選）');
  const note=v(r,'其他特殊條件或備註');

  document.getElementById('a4').innerHTML=`
    <div class="rh">
      <div class="av">${init}</div>
      <div>
        <div class="rname">${name}</div>
        <div class="rsub">央大門市 &amp; 豐亞門市｜門市人員應徵履歷</div>
      </div>
    </div>
    <div class="rbody">
      <div class="tg">
        <div>
          <div class="rsec">
            <div class="sh">個人基本資料</div>
            ${fr('身份證字號',v(r,'身份證字號'))}
            ${fr('出生年月日',v(r,'出生年月日（西元，例：1990/05/20）'))}
            ${fr('居住地址',v(r,'居住地址'))}
            ${fr('住家電話',v(r,'住家電話'))}
            ${fr('行動電話',v(r,'行動電話（手機）'))}
            ${fr('E-mail',v(r,'E-mail')||v(r,'Email'))}
            ${fr('緊急聯絡人',v(r,'緊急聯絡人'))}
            ${fr('緊急聯絡電話',v(r,'緊急聯絡人電話'))}
          </div>
          <div class="rsec">
            <div class="sh">學歷</div>
            ${fr('畢業學校',v(r,'畢業學校'))}
            ${fr('就讀科系',v(r,'就讀科系'))}
          </div>
          <div class="rsec">
            <div class="sh">統一超商經歷</div>
            ${fr('曾任職 7-11',sevenExp)}
            ${storeRef?fr('門市名稱',storeRef):''}
          </div>
        </div>
        <div>
          <div class="rsec">
            <div class="sh">期望工作條件</div>
            ${fr('期望地點',loc)}
            ${fr('交通工具',v(r,'交通工具'))}
            ${note?fr('備註',note):''}
            ${shiftArr.length?`
              <div style="margin-top:8px;">
                <div style="font-size:12px;font-weight:700;color:#333;margin-bottom:6px;">期望班別</div>
                <div class="sbadges">${shiftArr.map(s=>`<span class="sbadge">${s}</span>`).join('')}</div>
              </div>`:''}
          </div>
        </div>
        <div>
          <div class="rsec">
            <div class="sh">招募訊息來源</div>
            ${fr('得知管道',src)}
            ${ref?fr('介紹人',ref):''}
            ${platform?fr('人力銀行',platform):''}
          </div>
        </div>
      </div>
      <hr class="hdiv">
      <div class="rsec">
        <div class="sh">工作經歷</div>
        <div style="height:10px;"></div>
        <div class="exgrid">
          <div>${buildExp(r,1)}</div>
          <div>${buildExp(r,2)}</div>
        </div>
      </div>
    </div>
    <div class="agree">✓ 應徵者已詳閱並同意個資聲明與同意書｜本資料僅供面試徵才使用，於填寫日期後一個月內銷毀</div>
  `;

  const wrap=document.getElementById('a4wrap');
  wrap.style.display='block';
  wrap.scrollIntoView({behavior:'smooth',block:'start'});
}

function clearAll(){
  document.getElementById('ta').value='';
  document.getElementById('status').textContent='';
  document.getElementById('selrow').style.display='none';
  document.getElementById('hint').style.display='none';
  document.getElementById('a4wrap').style.display='none';
  document.getElementById('a4').innerHTML='';
  recs=[];hdrs=[];
}
</script>
</body>
</html>
